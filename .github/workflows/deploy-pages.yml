name: Test & deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Engine + storage tests (seed regression 26/23/11/9)
        run: node tests/engine.test.cjs

  # Publishes main to the gh-pages branch (GitHub Pages source). The Pages
  # REST API is not accessible to the workflow token on this repo, so the
  # classic branch-based deploy is used instead.
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push site to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          touch .nojekyll
          git add .nojekyll
          git commit -m "Deploy ${GITHUB_SHA::7}" --allow-empty
          git push -f origin gh-pages
