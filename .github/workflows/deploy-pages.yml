name: Test & deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
      - name: Engine + storage tests (seed regression 26/23/11/9)
        run: node tests/engine.test.cjs
      - name: Live-play rules engine tests
        run: node tests/game-core.test.cjs
      - name: Live-play networking tests (local transport)
        run: node tests/net.test.cjs

  # Publishes an explicit allowlist of site files to the gh-pages branch
  # (GitHub Pages source). The Pages REST API is not accessible to the
  # workflow token on this repo, so the classic branch-based deploy is used.
  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build publish set and push to gh-pages
        run: |
          set -euo pipefail
          mkdir /tmp/site
          cp index.html play.html styles.css folk.css play.css engine.js storage.js app.js game-core.js net.js play.js sw.js manifest.webmanifest /tmp/site/
          cp -r icons /tmp/site/icons
          cp -r vendor /tmp/site/vendor
          touch /tmp/site/.nojekyll
          # Stamp the service-worker cache name with the commit SHA so every
          # deploy changes sw.js bytes and installed clients pick up the update.
          V="${GITHUB_SHA::12}"
          sed -i "s/blitz-sidecar-v1/blitz-sidecar-${V}/" /tmp/site/sw.js
          # Version-stamp asset URLs in the HTML and the SW precache list, so a
          # freshly deployed page can never pair with a CDN-stale asset (the
          # Pages CDN caches per-URL for 10 minutes; a new query string is a new URL).
          for f in styles.css folk.css play.css engine.js storage.js app.js game-core.js net.js play.js vendor/peerjs.min.js manifest.webmanifest; do
            sed -i "s|\"$f\"|\"$f?v=${V}\"|g" /tmp/site/index.html /tmp/site/play.html
            sed -i "s|'./$f'|'./$f?v=${V}'|g" /tmp/site/sw.js
          done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          git rm -rfq .
          cp -r /tmp/site/. .
          git add -A
          git commit -m "Deploy ${GITHUB_SHA::7}"
          git push -f origin gh-pages
